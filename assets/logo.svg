<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-labelledby="title desc">
  <title id="title">ComfyUI Model Search and Load logo</title>
  <desc id="desc">A glowing search lens linking model files into a neural node graph.</desc>
  <defs>
    <linearGradient id="bg" x1="16" y1="10" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#191b3d"/>
      <stop offset="0.52" stop-color="#10182b"/>
      <stop offset="1" stop-color="#061b1d"/>
    </linearGradient>
    <linearGradient id="ring" x1="28" y1="25" x2="100" y2="103" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.48" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="file" x1="41" y1="31" x2="79" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#b6c7ff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.83 0 0 0 0 1 0 0 0 0.6 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bg)"/>
  <path d="M28 93C44 107 83 108 101 82C116 60 104 30 78 21C49 11 23 30 20 57" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <path d="M24 76C31 91 48 101 66 99C88 97 104 79 102 57" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.38"/>

  <g opacity="0.9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M33 43L52 30L79 37L96 58L88 84L62 98L38 86L25 64Z" fill="none" stroke="#475569" stroke-width="2" opacity="0.75"/>
    <circle cx="33" cy="43" r="4" fill="#38bdf8"/>
    <circle cx="79" cy="37" r="4" fill="#a78bfa"/>
    <circle cx="96" cy="58" r="4" fill="#34d399"/>
    <circle cx="62" cy="98" r="4" fill="#38bdf8"/>
    <circle cx="25" cy="64" r="4" fill="#a78bfa"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="58" cy="58" r="27" fill="#0f172a" stroke="url(#ring)" stroke-width="8"/>
    <path d="M78 78L101 101" stroke="url(#ring)" stroke-width="12" stroke-linecap="round"/>
  </g>

  <g>
    <path d="M47 36H65L77 48V79H47Z" fill="url(#file)"/>
    <path d="M65 36V49H77" fill="#dbeafe"/>
    <path d="M52 59H72M52 68H68" stroke="#2563eb" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <path d="M47 36H65L77 48V79H47Z" fill="none" stroke="#e0f2fe" stroke-width="2" opacity="0.8"/>
  </g>

  <path d="M84 34H95M90 28V40" stroke="#34d399" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
</svg>
